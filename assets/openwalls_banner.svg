<svg width="100%" viewBox="0 0 1200 410" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">OpenWalls banner</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Wide landscape banner with layered hills and OpenWalls wordmark</desc>

  <!-- Background -->
  <rect width="1200" height="400" fill="#080D1A" style="fill:rgb(8, 13, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Landscape layers -->
  <path d="M0 260 Q200 100 420 180 Q600 240 780 140 Q960 40 1200 160 L1200 400 L0 400 Z" fill="#162566" style="fill:rgb(22, 37, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M0 300 Q180 180 320 230 Q460 275 600 220 Q740 165 880 240 Q1020 310 1200 220 L1200 400 L0 400 Z" fill="#2040A8" style="fill:rgb(32, 64, 168);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M0 340 Q200 260 340 290 Q480 318 600 278 Q720 238 860 295 Q1000 348 1200 290 L1200 400 L0 400 Z" fill="#3A60D0" style="fill:rgb(58, 96, 208);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M0 375 Q300 330 600 338 Q900 346 1200 320 L1200 400 L0 400 Z" fill="#5A85E8" style="fill:rgb(90, 133, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Horizon glow -->
  <path d="M0 265 Q300 240 600 245 Q900 250 1200 230" fill="none" stroke="#7AAAFF" stroke-width="1" opacity="0.3" style="fill:none;stroke:rgb(122, 170, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="96" y="148" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" opacity="0.95" letter-spacing="-2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:system-ui, sans-serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">open</text>
  <text x="96" y="220" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#107A88" opacity="1" letter-spacing="-2" style="fill:rgb(16, 122, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">walls</text>
</svg>