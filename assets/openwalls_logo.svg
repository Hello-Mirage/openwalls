<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OpenWalls logo</title>
  <desc>Layered landscape logo with teal concentric rings</desc>

  <defs>
    <clipPath id="cc">
      <circle cx="340" cy="340" r="280"/>
    </clipPath>
  </defs>

  <circle cx="340" cy="340" r="280" fill="#080D1A"/>

  <!-- Concentric rings — teal accent -->
  <circle cx="340" cy="340" r="280" fill="none" stroke="#0D4F5C" stroke-width="28" clip-path="url(#cc)"/>
  <circle cx="340" cy="340" r="224" fill="none" stroke="#0E6370" stroke-width="22" clip-path="url(#cc)"/>
  <circle cx="340" cy="340" r="175" fill="none" stroke="#107A88" stroke-width="18" clip-path="url(#cc)"/>

  <!-- Inner fill -->
  <circle cx="340" cy="340" r="157" fill="#080D1A" clip-path="url(#cc)"/>

  <!-- Landscape layers -->
  <path d="M60 500 Q170 300 340 370 Q510 440 620 280 L620 620 L60 620 Z"
        fill="#162566" clip-path="url(#cc)"/>
  <path d="M60 540 Q150 370 250 430 Q295 460 340 415 Q385 368 430 430 Q530 510 620 350 L620 620 L60 620 Z"
        fill="#2040A8" clip-path="url(#cc)"/>
  <path d="M60 580 Q160 450 240 490 Q290 515 340 472 Q390 428 440 490 Q530 545 620 430 L620 620 L60 620 Z"
        fill="#3A60D0" clip-path="url(#cc)"/>
  <path d="M60 615 Q200 530 340 538 Q480 546 620 510 L620 620 L60 620 Z"
        fill="#5A85E8" clip-path="url(#cc)"/>

  <!-- Horizon glow -->
  <path d="M130 490 Q235 468 340 472 Q445 476 550 455"
        fill="none" stroke="#7AAAFF" stroke-width="1" opacity="0.35" clip-path="url(#cc)"/>

  <!-- Outer border -->
  <circle cx="340" cy="340" r="280" fill="none" stroke="#107A88" stroke-width="1.5"/>
</svg>
